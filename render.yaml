# Free deploy on Render — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: kaala-hrms
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: node dist/server.cjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=460
      - key: APP_URL
        value: https://employee.bymarketingonly.com
      - key: VITE_BASE_DOMAIN
        value: bymarketingonly.com
      - key: TZ
        value: Asia/Kolkata