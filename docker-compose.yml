services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kaala-hrms-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_URL: ${APP_URL:-https://bymarketingonly.com}
    volumes:
      - app_data:/app/data
    networks:
      - kaala-network
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(''http://localhost:3000/api/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"']
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    container_name: kaala-hrms-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - kaala-network

  certbot:
    image: certbot/certbot:latest
    container_name: kaala-hrms-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: '/bin/sh -c trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'
    networks:
      - kaala-network

volumes:
  app_data:
  certbot_www:
  certbot_conf:

networks:
  kaala-network:
    driver: bridge