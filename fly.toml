# Free-tier Fly.io deploy with persistent data volume
# See scripts/deploy-fly.sh

app = 'kaala-hrms'
primary_region = 'bom'

[build]

[env]
  NODE_ENV = 'production'
  APP_URL = 'https://bymarketingonly.com'
  TZ = 'Asia/Kolkata'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = 'kaala_data'
  destination = '/app/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'